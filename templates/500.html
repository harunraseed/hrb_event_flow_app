{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="text-center py-5 animate-fade-in">
    <div style="font-size: 5rem; color: var(--danger); margin-bottom: 1rem;">
        <i class="bi bi-exclamation-octagon"></i>
    </div>
    <h1 style="font-size: 4rem; font-weight: 800; color: var(--text); letter-spacing: -0.03em;">500</h1>
    <h2 style="font-weight: 700; color: var(--text-secondary); margin-bottom: 0.75rem;">Something Went Wrong</h2>
    <p class="text-muted mb-4" style="max-width: 420px; margin: 0 auto;">An unexpected error occurred on our end. Please try again in a moment.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i> Back to Home</a>
        <button onclick="location.reload()" class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise me-1"></i> Retry</button>
    </div>
</div>
{% endblock %}
