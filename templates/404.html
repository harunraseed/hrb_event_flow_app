{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5 animate-fade-in">
    <div style="font-size: 5rem; color: var(--primary); margin-bottom: 1rem;">
        <i class="bi bi-compass"></i>
    </div>
    <h1 style="font-size: 4rem; font-weight: 800; color: var(--text); letter-spacing: -0.03em;">404</h1>
    <h2 style="font-weight: 700; color: var(--text-secondary); margin-bottom: 0.75rem;">Page Not Found</h2>
    <p class="text-muted mb-4" style="max-width: 400px; margin: 0 auto;">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i> Back to Home</a>
        <button onclick="history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Go Back</button>
    </div>
</div>
{% endblock %}
