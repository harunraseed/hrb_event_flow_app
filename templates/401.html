{% extends "base.html" %}
{% block title %}Unauthorized{% endblock %}
{% block content %}
<div class="text-center py-5 animate-fade-in">
    <div style="font-size: 5rem; color: var(--warning); margin-bottom: 1rem;">
        <i class="bi bi-shield-lock"></i>
    </div>
    <h1 style="font-size: 4rem; font-weight: 800; color: var(--text); letter-spacing: -0.03em;">401</h1>
    <h2 style="font-weight: 700; color: var(--text-secondary); margin-bottom: 0.75rem;">Unauthorized Access</h2>
    <p class="text-muted mb-4" style="max-width: 400px; margin: 0 auto;">You don't have permission to access this resource. Please log in or contact an administrator.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="{{ url_for('login') }}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
        <a href="/" class="btn btn-outline-secondary"><i class="bi bi-house me-1"></i> Home</a>
    </div>
</div>
{% endblock %}
